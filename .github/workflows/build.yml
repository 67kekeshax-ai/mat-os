name: Build ISO
on: [push, workflow_dispatch]
jobs:
  build-os:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Build Script
        run: |
          chmod +x scripts/build.sh
          sudo ./scripts/build.sh
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: MAT-OS-ISO
          path: "**/*.iso"
